<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Amber glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Corn kernel gradient -->
    <linearGradient id="kernel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <!-- Husk gradient -->
    <linearGradient id="husk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <!-- Handle/grip gradient (dark leather) -->
    <linearGradient id="grip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="50%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0e1a" stroke="#ffc107" stroke-width="2.5"/>

  <!-- Code lines in background (varying lengths, styled like source code) -->
  <g opacity="0.12" stroke="#ffc107" stroke-width="1.5" stroke-linecap="round">
    <line x1="25" y1="35" x2="68" y2="35"/>
    <line x1="30" y1="43" x2="85" y2="43"/>
    <line x1="30" y1="51" x2="72" y2="51"/>
    <line x1="35" y1="59" x2="58" y2="59"/>
    <line x1="30" y1="67" x2="90" y2="67"/>
    <line x1="25" y1="75" x2="55" y2="75"/>
    <line x1="30" y1="83" x2="78" y2="83"/>
    <line x1="35" y1="91" x2="62" y2="91"/>

    <line x1="120" y1="110" x2="175" y2="110"/>
    <line x1="115" y1="118" x2="160" y2="118"/>
    <line x1="120" y1="126" x2="172" y2="126"/>
    <line x1="125" y1="134" x2="155" y2="134"/>
    <line x1="115" y1="142" x2="170" y2="142"/>
    <line x1="120" y1="150" x2="148" y2="150"/>
    <line x1="125" y1="158" x2="168" y2="158"/>
    <line x1="115" y1="166" x2="158" y2="166"/>
  </g>

  <!-- One "violation" line — longer, in red, crossing the limit -->
  <g opacity="0.3">
    <line x1="30" y1="67" x2="105" y2="67" stroke="#ff5252" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="115" y1="142" x2="185" y2="142" stroke="#ff5252" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- === THE COB-BATON (angled like a nightstick, ~40 degrees) === -->
  <g transform="translate(100,100) rotate(-40) translate(-100,-100)">
    <!-- Baton handle/grip (bottom) -->
    <rect x="90" y="148" width="20" height="30" rx="4" ry="4" fill="url(#grip)" stroke="#4e342e" stroke-width="1"/>
    <!-- Grip ridges -->
    <line x1="93" y1="155" x2="107" y2="155" stroke="#4e342e" stroke-width="0.8" opacity="0.6"/>
    <line x1="93" y1="160" x2="107" y2="160" stroke="#4e342e" stroke-width="0.8" opacity="0.6"/>
    <line x1="93" y1="165" x2="107" y2="165" stroke="#4e342e" stroke-width="0.8" opacity="0.6"/>
    <line x1="93" y1="170" x2="107" y2="170" stroke="#4e342e" stroke-width="0.8" opacity="0.6"/>

    <!-- Guard ring between handle and cob -->
    <ellipse cx="100" cy="148" rx="13" ry="4" fill="#795548" stroke="#4e342e" stroke-width="1"/>

    <!-- Corn cob body -->
    <rect x="87" y="48" width="26" height="100" rx="13" ry="13" fill="url(#kernel)" stroke="#f9a825" stroke-width="1"/>

    <!-- Kernel rows (horizontal lines across the cob) -->
    <g stroke="#f9a825" stroke-width="0.7" opacity="0.6">
      <line x1="89" y1="58" x2="111" y2="58"/>
      <line x1="88" y1="66" x2="112" y2="66"/>
      <line x1="87" y1="74" x2="113" y2="74"/>
      <line x1="87" y1="82" x2="113" y2="82"/>
      <line x1="87" y1="90" x2="113" y2="90"/>
      <line x1="87" y1="98" x2="113" y2="98"/>
      <line x1="88" y1="106" x2="112" y2="106"/>
      <line x1="88" y1="114" x2="112" y2="114"/>
      <line x1="89" y1="122" x2="111" y2="122"/>
      <line x1="90" y1="130" x2="110" y2="130"/>
      <line x1="91" y1="138" x2="109" y2="138"/>
    </g>

    <!-- Kernel column lines (vertical, giving the grid pattern) -->
    <g stroke="#f9a825" stroke-width="0.5" opacity="0.4">
      <line x1="93" y1="52" x2="93" y2="145"/>
      <line x1="97" y1="50" x2="97" y2="146"/>
      <line x1="100" y1="48" x2="100" y2="148"/>
      <line x1="103" y1="50" x2="103" y2="146"/>
      <line x1="107" y1="52" x2="107" y2="145"/>
    </g>

    <!-- Husk leaves peeling back at the top -->
    <path d="M94 55 Q88 35 78 22" fill="none" stroke="url(#husk)" stroke-width="4" stroke-linecap="round"/>
    <path d="M100 50 Q100 28 95 15" fill="none" stroke="url(#husk)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M106 55 Q112 35 122 22" fill="none" stroke="url(#husk)" stroke-width="4" stroke-linecap="round"/>

    <!-- Silk threads at the top -->
    <g stroke="#ffcc80" stroke-width="0.6" opacity="0.5" stroke-linecap="round">
      <path d="M97 50 Q92 30 85 18" fill="none"/>
      <path d="M99 48 Q96 25 100 10" fill="none"/>
      <path d="M103 50 Q108 30 115 18" fill="none"/>
    </g>
  </g>

  <!-- Subtle amber glow behind the cob -->
  <circle cx="100" cy="95" r="45" fill="#ffc107" opacity="0.04" filter="url(#glow)"/>
</svg>
